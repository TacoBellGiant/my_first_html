<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Welcome the the world of Javascript</h2>
    <script>
        let name = "Sumit";
        let favouriteSubject = "Math";
        let grade = 5;
        console.log(`My name is ${name}. I study in grade ${grade}. My favourite subject is ${favouriteSubject}.`);

        let student  = {name : 'Sumit', grade: 5, favouriteSubject: "Math"};
        console.log(`My name is ${student.name}. I study in grade ${student.grade}. My favourite subject is ${student.favouriteSubject}.`)
    </script>
</body>
</html>
