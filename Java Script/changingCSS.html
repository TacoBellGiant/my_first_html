<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Changer</title>

<style>

h2 {
    text-align: center;
}

.rectangle {
    border: 1px solid black;
    width: 200px;
    height: 200px;
    margin: auto;
}

.buttons {
    padding: 20px;
    width: 300px;
    margin: auto;
    text-align: center;
}

button{
    margin:4px;
}

/* COOL MOVING PATTERN */

.pattern{
    background: repeating-linear-gradient(
        45deg,
        red 0px,
        red 15px,
        yellow 15px,
        yellow 30px
    );
    background-size: 300px 300px;
    animation: movePattern 2s linear infinite;
}

@keyframes movePattern{
    from{
        background-position:0 0;
    }
    to{
        background-position:300px 300px;
    }
}

</style>
</head>

<body>

<h2>Make changes to the rectangle</h2>

<div class="rectangle"></div>

<div class="buttons">

<button onclick="changeToCircle()">Make circle</button>
<button onclick="hideRect()">Hide</button>
<button onclick="showRect()">Show</button>
<button onclick="makeRect()">Make rectangle</button>
<button onclick="makeTri()">Make triangle</button>
<button onclick="makeStar()">Make star</button>
<button onclick="makeDiamond()">Make diamond</button>
<button onclick="infinitePattern()">Infinite Pattern 😎</button>

</div>

<script>

let div = document.querySelector(".rectangle");

function resetShape(){
    div.classList.remove("pattern");

    div.style.width="200px";
    div.style.height="200px";
    div.style.border="1px solid black";
    div.style.borderLeft="";
    div.style.borderRight="";
    div.style.borderBottom="";
    div.style.clipPath="";
    div.style.borderRadius="0%";
    div.style.background="";
}

function changeToCircle(){
    resetShape();
    div.style.borderRadius="50%";
}

function hideRect(){
    div.style.display="none";
}

function showRect(){
    div.style.display="block";
}

function makeRect(){
    resetShape();
}

function makeTri(){
    resetShape();

    div.style.width="0";
    div.style.height="0";
    div.style.borderLeft="100px solid transparent";
    div.style.borderRight="100px solid transparent";
    div.style.borderBottom="200px solid black";
}

function makeStar(){
    resetShape();
    div.style.clipPath="polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)";
}

function makeDiamond(){
    resetShape();
    div.style.clipPath="polygon(50% 0%,100% 50%,50% 100%,0% 50%)";
}

function infinitePattern(){
    resetShape();
    div.classList.add("pattern");
}

div.onmouseenter=function(){
    if(!div.classList.contains("pattern")){
        div.style.background="red";
    }
};

div.onmouseleave=function(){
    if(!div.classList.contains("pattern")){
        div.style.background="transparent";
    }
};

</script>

</body>
</html>
