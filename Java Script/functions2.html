<!DOCTYPE html>

    <title>Functions</title>
</head>
<body>
    <h2>Welcome to the world of javascript</h2>
    <script>
        function sumOfTwoNumbers(x, y) {
            let z;
            z = x + y;

            return z;
        }
        let sum = sumOfTwoNumbers(5, 6);
        console.log("The Sum of x and y is" + sum);
    </script>
