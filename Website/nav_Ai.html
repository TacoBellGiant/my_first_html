<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Future 2050</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0a0f2c, #020617);
      color: white;
    }

    /* Glow text */
    .glow {
      text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
    }

    /* Glass effect */
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
    }

    /* Neon button */
    .btn-future {
      background: linear-gradient(90deg, #00f0ff, #7c3aed);
      border: none;
      color: white;
      transition: 0.3s;
    }

    .btn-future:hover {
      box-shadow: 0 0 15px #00f0ff;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass px-4">
  <a class="navbar-brand glow" href="#">FutureX</a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link text-info" href="#">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<div class="container text-center d-flex flex-column justify-content-center align-items-center" style="height: 90vh;">
  
  <h1 class="display-3 glow mb-3">Welcome to 2050</h1>
  
  <p class="lead text-secondary mb-4">
    Where AI, creativity, and technology merge into one seamless future.
  </p>

  <button class="btn btn-future btn-lg px-4">Explore Now</button>

</div>

<!-- FEATURES -->
<div class="container pb-5">
  <div class="row g-4 text-center">

    <div class="col-md-4">
      <div class="p-4 glass">
        <h4 class="text-info">AI Powered</h4>
        <p class="text-secondary">Smart systems that evolve with you.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="p-4 glass">
        <h4 class="text-info">Fast & Modern</h4>
        <p class="text-secondary">Built for speed and performance.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="p-4 glass">
        <h4 class="text-info">Next Gen Design</h4>
        <p class="text-secondary">Clean, futuristic, and immersive.</p>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
