<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
    body {
        margin: 0;
        font-family: Arial;
    }

    .topnav {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 10px;
        background: #f1f5f9;
    }

    .topnav a {
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        color: #374151;
        background: white;
        transition: 0.3s;
    }

    .topnav a:hover {
        background: #2563eb;
        color: white;
    }

    .topnav a.active {
        background: #111827;
        color: white;
    }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#">About Us</a>
        <a href="#">Gallery</a>
        <a href="#">Contact Us</a>
    </div>
</body>
</html>
