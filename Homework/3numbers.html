<!DOCTYPE html>
<html>
<head>
    <title>Swap 3 Numbers</title>
</head>
<body>

<h2>Swap 3 Numbers Program</h2>

<label>Enter first number:</label>
<input type="number" id="num1"><br><br>

<label>Enter second number:</label>
<input type="number" id="num2"><br><br>

<label>Enter third number:</label>
<input type="number" id="num3"><br><br>

<button onclick="swapNumbers()">Swap Numbers</button>

<h3 id="result"></h3>

<script>
function swapNumbers() {
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;
    let c = document.getElementById("num3").value;

    let tempA = a;
    a = c;
    c = b;
    b = tempA;

    document.getElementById("result").innerHTML =
        "After Swapping:<br>" +
        "First Number = " + a + "<br>" +
        "Second Number = " + b + "<br>" +
        "Third Number = " + c;
}
</script>

</body>
</html>
