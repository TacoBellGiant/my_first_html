<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobby Blog</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: white;
        text-align: center;
    }

    /* Simple loader */
    #loader {
        position: fixed;
        width: 100%;
        height: 100%;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    h1 {
        padding: 20px;
    }

    .card {
        background: #2e2e4d;
        margin: 20px auto;
        padding: 20px;
        width: 250px;
        border-radius: 10px;
        transition: 0.3s;
        cursor: pointer;
    }

    .card:hover {
        background: #00eaff;
        color: black;
        transform: scale(1.05);
    }

    button {
        margin-top: 10px;
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        background: #00eaff;
        cursor: pointer;
    }
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">Loading...</div>

<h1>🌟 My Hobby Blog</h1>

<div class="card">
    <h2>🎮 Gaming</h2>
    <p>Fun and competitive games!</p>
    <button onclick="showMessage('Gaming is awesome! 🎮')">Click</button>
</div>

<div class="card">
    <h2>💻 Coding</h2>
    <p>Create websites and apps.</p>
    <button onclick="showMessage('Coding is powerful! 💻')">Click</button>
</div>

<div class="card">
    <h2>🎨 Drawing</h2>
    <p>Express your creativity.</p>
    <button onclick="showMessage('Keep drawing! 🎨')">Click</button>
</div>

<script>
    // Loader event
    window.onload = function() {
        document.getElementById("loader").style.display = "none";
    }

    // Button click event
    function showMessage(text) {
        alert(text);
    }
</script>

</body>
</html>
