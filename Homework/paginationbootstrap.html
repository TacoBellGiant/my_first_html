<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination With Bootstrap</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
            background-size: cover;
        }

        .title {
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 50px;
            background-color: rgba(20, 177, 208, 0.8);
            border-radius: 15px;
            color: white;
            padding: 20px;
            margin: 40px auto;
            width: fit-content;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            margin: 50px 10%;
        }

        .button1, .button2 {
            font-size: 27px;
            font-family: cursive;
            background-color: rgba(36, 189, 26, 0.9);
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            border-radius: 15px;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
        }

        .button1:hover, .button2:hover {
            transform: scale(1.1);
            background-color: rgba(50, 220, 40, 1);
        }
    </style>
</head>
<body>
    <h1 class="title">Pagination</h1>

    <div class="button-container">
        <a href="hobbyHW.html">
            <button class="button1">Hobbies</button>
        </a>

        <a href="paginationbootstrap.html">
            <button class="button2">Pagination</button>
        </a>
    </div>
</body>
</html>
