<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routine Flow Chart</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #74ebd5, #9face6);
  margin: 0;
  padding: 40px;
  text-align: center;
}
.container {
  max-width: 500px;
  margin: auto;
}
.box {
  background: white;
  color: #333;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.arrow {
  font-size: 28px;
  color: white;
}
h1 {
  color: white;
}
</style>
</head>
<body>
<div class="container">
  <h1>My Daily Routine</h1>
  <div class="box">Wake Up</div>
  <div class="arrow">↓</div>
  <div class="box">Brush Teeth & Get Ready</div>
  <div class="arrow">↓</div>
  <div class="box">Eat Breakfast</div>
  <div class="arrow">↓</div>
  <div class="box">Go to School</div>
  <div class="arrow">↓</div>
  <div class="box">Homework / Study</div>
  <div class="arrow">↓</div>
  <div class="box">Play Games / Free Time</div>
  <div class="arrow">↓</div>
  <div class="box">Eat Dinner</div>
  <div class="arrow">↓</div>
  <div class="box">Sleep</div>
</div>
</body>
</html>
