<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .title{
            text-align:center;
            background-color: rgb(99,181,11);
            border-radius:10px;
            margin:35px;
            padding:15px;
            font-family:monospace;
        }

        .h3{
            font-family:cursive;
        }

        .calculator{
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            background-color:rgb(99,181,11);
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background-color:rgb(80,150,8);
        }

        #result{
            margin-top:15px;
            font-weight:bold;
            font-size:18px;
        }

        .error{
            color:red;
        }
    </style>
</head>

<body>

<h1 class="title">My Calculator</h1>
<h3 class="h3">(Multiplication Only)</h3>

<div class="calculator">

    <input type="text" id="num1" placeholder="Enter first number">

    <input type="text" id="num2" placeholder="Enter second number">

    <br>

    <button onclick="multiply()">Multiply</button>

    <div id="result"></div>

</div>

<script>

function multiply(){

    let number1 = document.getElementById("num1").value;
    let number2 = document.getElementById("num2").value;
    let resultBox = document.getElementById("result");

    if(number1 === "" || number2 === ""){
        resultBox.innerHTML = "Please enter both numbers.";
        resultBox.className = "error";
        return;
    }

    if(isNaN(number1) || isNaN(number2)){
        resultBox.innerHTML = "Only numbers are allowed.";
        resultBox.className = "error";
        return;
    }

    number1 = Number(number1);
    number2 = Number(number2);

    let result = number1 * number2;

    resultBox.className = "";
    resultBox.innerHTML = "Result: " + result;
}

</script>

</body>
</html>
