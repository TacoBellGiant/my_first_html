<!DOCTYPE html>
<html>
<head>
<title>Viransh's Website</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #4facfe, #43e97b);
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.container {
  padding: 30px;
  flex: 1;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  backdrop-filter: blur(10px);
}

h1 { font-size: 40px; }

ul {
  list-style: none;
  padding: 0;
}

li { margin: 8px 0; }

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* Footer styling */
footer {
  background: rgba(0,0,0,0.2);
  padding: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hi, I'm Viransh </h1>

  <div class="card">
    <h2>About Me</h2>
    <p>I'm an 11-year-old boy from California.</p>
    <p>I love sports and having fun!</p>
  </div>

  <div class="card">
    <h2>My Favorites 💙💚</h2>
    <p>Favorite Colors: Blue & Green</p>
  </div>

  <div class="card">
    <h2>Sports I Love ⚽🏀⚾🎾</h2>
    <ul>
      <li>Football</li>
      <li>Basketball</li>
      <li>Baseball</li>
      <li>Tennis</li>
    </ul>
  </div>

  <div class="card">
    <h2>Cool Sports Image</h2>
    <img src="https://images.pexels.com/photos/46798/the-ball-stadion-football-the-pitch-46798.jpeg">
  </div>

</div>

<footer>
  <p>© 2026 Viransh's Website | Made with 💻</p>
</footer>

</body>
</html>
